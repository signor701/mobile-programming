<!DOCTYPE html>
<html>
<head>
    <title>ATM Machine</title>
</head>

<body>

    <h1>ATM Machine</h1>

    <h3 id="balance">Balance: Rs. 10000</h3>

    <input type="number" id="amount">

    <button onclick="withdraw()">Withdraw</button>

    <button onclick="deposit()">Deposit</button>

    <h2 id="message"></h2>

    <script>

        let balance = 10000;
        let pin = 2061;

        function withdraw(){

            let enteredPin = prompt("Enter PIN");

            if(enteredPin == pin){

                let amount = Number(document.getElementById("amount").value);

                // Multiple of 100 check
                
                if(amount % 100 != 0){

                    document.getElementById("message").innerHTML =
                    "Withdraw amount must be multiple of 100";

                }

                else{
                    balance = balance - amount;

                    document.getElementById("balance").innerHTML =
                    "Balance: Rs. " + balance;

                    document.getElementById("message").innerHTML =
                    "Withdrawal Successful";

                }

            }

            else{
                document.getElementById("message").innerHTML =
                "Incorrect PIN";
            }

        }

        function deposit(){

            let enteredPin = prompt("Enter PIN");

            if(enteredPin == pin){

                let amount = Number(document.getElementById("amount").value);

                //check if amount is valid
                if (amount<=0){
                    document.getElementById("message").innerHTML="Enter a valid deposit amount";
                }
                else{
                balance = balance + amount;

                document.getElementById("balance").innerHTML =
                "Balance: Rs. " + balance;

                document.getElementById("message").innerHTML =
                "Deposit Successful";
                }
            }

            else{

                document.getElementById("message").innerHTML =
                "Incorrect PIN";

            }

        }

    </script>

</body>
</html>
