<!DOCTYPE html> 
<html>
<head>
    <title>Box Animation</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        .container{
            width:500px;
            height:500px;
            border:2px solid black;
            position:relative;
        }

        .box{
            width:80px;
            height:80px;
            background:red;
            position:absolute;
            top:0;
            left:0;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="box"></div>
    </div>

    <button id="botton">Move Box</button>

    <script>
       $("button").click(function(){

            $(".box").animate(
                {top:"420px"},
                2000,
                function(){

                    $(".box").css("background","blue");

                    $(".box").animate(
                        {left:"420px"},
                        2000,
                        function(){

                            $(".box").css("background","green");

                            $(".box").animate(
                                {top:"0px"},
                                2000,
                                function(){

                                    $(".box").css("background","yellow");

                                    $(".box").animate(
                                        {left:"0px"},
                                        2000,
                                        function(){
                                        }
                                    );

                                }
                            );

                        }
                    );

                }
            );

        });

    </script>

</body>
</html>
