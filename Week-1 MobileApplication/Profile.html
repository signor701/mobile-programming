<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signor Pandeya Profile Card</title>

    <style>
        body {
            background-color: lightgrey;
            font-family: 'Times New Roman', Times, serif;
        }

        .card {
            width: 320px;
            background-color: #2E8B57;
            color: white;
            padding: 20px;
            margin: auto;
            margin-top: 50px;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        #heading {
            color: gold;
            margin-top: 10px;
        }

        .details {
            font-size: 16px;
            margin: 8px 0;
        }

        .btn {
            background-color: white;
            color: darkgreen;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn:hover {
            background-color: gold;
            color: black;
        }
    </style>
</head>

<body>

    <div class="card">
        <img class="photo" src="Student.jpg" alt="Signor Photo">

        <h1 id="heading">Student Profile</h1>

        <p class="details"><b>Name:</b> Signor Pandeya</p>
        <p class="details"><b>Course:</b> BSIT</p>
        <p class="details"><b>Address:</b> Kathmandu, Nepal</p>
        <p class="details"><b>Email:</b> signorpandey6@gmail.com</p>
        <p class="details"><b>Interests:</b> Animal Welfare, Spirituality, AI & Technology</p>

        <button class="btn">More</button>
    </div>

</body>
</html>
