<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>

    <h1>Calculator</h1>

    <input type="number" id="s1" placeholder="Enter first number"><br><br>

    <input type="number" id="s2" placeholder="Enter second number"><br><br>

    <button onclick="calculate('add')">Addition</button>

    <button onclick="calculate('subtract')">Subtraction</button>

    <button onclick="calculate('multiply')">Multiplication</button>

    <button onclick="calculate('divide')">Division</button>

    <h2 id="result">Result:</h2>

    <script>

        function calculate(operation) {

            let num1 = Number(document.getElementById("s1").value);
            let num2 = Number(document.getElementById("s2").value);

            let result;

            if (operation === "add") {

                result = num1 + num2;

            }

            else if (operation === "subtract") {

                result = num1 - num2;

            }

            else if (operation === "multiply") {

                result = num1 * num2;

            }

            else if (operation === "divide") {

                if(num2 == 0){

                    result = "Cannot divide by zero";

                }

                else{

                    result = num1 / num2;

                }

            }

            document.getElementById("result").innerText = "Result: " + result;

        }

    </script>

</body>
</html>
